      <script>
    
    document.addEventListener('DOMContentLoaded', () => {
      const links = document.querySelectorAll('.smooth-link');

      links.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault(); 
          const targetId = this.getAttribute('href').substring(1);
          const target = document.getElementById(targetId);

          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    });

const glow = document.createElement('div');
document.body.appendChild(glow);

// gold loves js
Object.assign(glow.style, {
    width: '400px',               
    height: '200px',              
    borderRadius: '50% 50% 0 0',  
    background: 'radial-gradient(circle at center top, rgba(255,0,0,0.5) 0%, rgba(255,0,0,0) 80%)',
    filter: 'blur(40px)',         
    position: 'absolute',         
    top: '0',                     
    left: '50%',                  
    transform: 'translateX(-50%) scale(1)',
    pointerEvents: 'none',        
    zIndex: '9999',
});
let scaleUp = true;
setInterval(() => {
    const currentScale = parseFloat(glow.style.transform.match(/scale\((.*)\)/)?.[1]) || 1;
    const newScale = scaleUp ? currentScale + 0.01 : currentScale - 0.01;
    glow.style.transform = `translateX(-50%) scale(${newScale})`;
    
    if (newScale >= 1.15) scaleUp = false;
    if (newScale <= 1) scaleUp = true;
}, 30);
